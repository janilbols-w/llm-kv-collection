# LMCache config template for vLLM instance B (cross-instance cache reuse)
# IMPORTANT:
# - Set remote_url to the same shared backend as instance A.
# - Keep chunk_size / remote_serde / model/tokenizer settings aligned across instances.

chunk_size: 256
local_cpu: true
max_local_cpu_size: 8.0
reserve_local_cpu_size: 0.0
save_unfull_chunk: false
cache_policy: "LRU"
blocking_timeout_secs: 120
min_retrieve_tokens: 0

# Optional local disk tier
local_disk: null
max_local_disk_size: 0.0

# Shared remote backend (must be same for both instances)
# Example: resp://127.0.0.1:7379
remote_url: "mooncakestore://127.0.0.1:50051/"
remote_serde: "naive"
extra_config:
  local_hostname: "127.0.0.1"
  metadata_server: "http://127.0.0.1:9980/metadata"
  master_server_address: "127.0.0.1:50051"
  protocol: "tcp"
  device_name: ""
  global_segment_size: 2147483648
  local_buffer_size: 0
  save_chunk_meta: false
  use_exists_sync: true
  mooncake_prefer_local_alloc: true

enable_async_loading: false

# Controller/P2P (optional for advanced management)
enable_controller: false
lmcache_instance_id: "lmcache_instance_b"
controller_pull_url: null
controller_reply_url: null
lmcache_worker_ports: null
lmcache_worker_ids: null

enable_p2p: false
p2p_host: null
p2p_init_ports: null
p2p_lookup_ports: null
transfer_channel: null

internal_api_server_enabled: false
internal_api_server_host: "0.0.0.0"
internal_api_server_port_start: 6999
internal_api_server_socket_path_prefix: null

enable_blending: false
blend_recompute_ratios: null
blend_thresholds: null
blend_check_layers: null
blend_min_tokens: 256
blend_special_str: " # # "
retrieve_locations: null
store_location: null

runtime_plugin_locations: null
storage_plugins: null
remote_storage_plugins: null

remote_config_url: null
app_id: null
